<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha del Asesor de Investigación — Postgrado PUCMM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#f0ede8;padding:24px;min-height:100vh}
.page{max-width:940px;margin:0 auto;margin-bottom:100px}

/* HEADER GLOBAL */
.global-header{background:#fff;padding:0 0 0;box-shadow:0 4px 32px rgba(0,0,0,0.13);margin-bottom:20px}
.accent-bar{height:6px;background:linear-gradient(to right,#1a2e4a 60%,#c0832a 100%)}
.doc-header{padding:20px 36px 16px;border-bottom:2px solid #1a2e4a}
.university-name{font-size:11pt;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#1a2e4a;text-align:center}
.decanato{font-size:9pt;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#c0832a;text-align:center;margin-top:2px}
.doc-title{font-family:'Playfair Display',serif;font-size:18pt;color:#1a2e4a;text-align:center;margin-top:8px;line-height:1.2}

/* COORDINADOR STRIP */
.coord-strip{background:#fff;padding:14px 36px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;border-bottom:1px solid #d0d8e2}
.field-group{display:flex;flex-direction:column;gap:2px}
.field-label{font-size:7pt;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#7a8fa6;margin-bottom:2px}
input[type=text],input[type=email],input[type=tel],select,textarea{font-family:'Source Sans 3',sans-serif;font-size:9.5pt;color:#1a2e4a;border:none;border-bottom:1.5px solid #b0b8c4;background:transparent;outline:none;width:100%;padding:3px 4px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-bottom-color:#c0832a;background:#fffdf7}

/* ASESOR CARD */
.asesor-card{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:20px;border-radius:6px;overflow:hidden;border:1px solid #d0d8e2}
.asesor-card-header{background:#1a2e4a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.asesor-card-title{color:#fff;font-size:11pt;font-weight:600;display:flex;align-items:center;gap:10px}
.asesor-num{background:#c0832a;color:#fff;font-size:9pt;font-weight:600;padding:2px 9px;border-radius:12px}
.asesor-name-preview{font-size:9pt;color:#b0c4d8;font-weight:400}
.asesor-card-actions{display:flex;gap:8px;align-items:center}
.collapse-btn{background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:3px;padding:3px 10px;font-size:8.5pt;cursor:pointer;font-family:'Source Sans 3',sans-serif}
.collapse-btn:hover{background:rgba(255,255,255,0.1)}
.del-asesor-btn{background:none;border:1px solid rgba(192,57,43,0.5);color:#e74c3c;border-radius:3px;padding:3px 10px;font-size:8.5pt;cursor:pointer;font-family:'Source Sans 3',sans-serif}
.del-asesor-btn:hover{background:rgba(192,57,43,0.1)}
.asesor-body{padding:20px 24px;display:block}
.asesor-body.collapsed{display:none}

/* SECTION TITLES */
.section-title{font-size:8pt;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;background:#1a2e4a;border-left:4px solid #c0832a;padding:5px 12px;margin:16px 0 10px}

/* DATOS GRID */
.datos-grid{display:grid;grid-template-columns:150px 1fr;gap:0;border:1px solid #d0d8e2;border-radius:4px;overflow:hidden}
.foto-cell{border-right:1px solid #d0d8e2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:6px;background:#f7f9fb}
.foto-preview{width:120px;height:140px;border:1.5px dashed #b0b8c4;border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;background:#edf1f6}
.foto-preview img{width:100%;height:100%;object-fit:cover;display:none}
.foto-placeholder{font-size:8.5pt;color:#7a8fa6;text-align:center;line-height:1.4;padding:6px}
.foto-btn{font-size:7.5pt;color:#1a2e4a;border:1px solid #b0b8c4;border-radius:3px;padding:3px 8px;cursor:pointer;background:#fff;font-family:'Source Sans 3',sans-serif}
.foto-btn:hover{background:#edf1f6}
.datos-fields{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.field-row{display:grid;gap:10px}
.field-row.two{grid-template-columns:1fr 1fr}
.field-row.three{grid-template-columns:1fr 1fr 1fr}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:9pt}
.data-table thead th{background:#1a2e4a;color:#fff;padding:6px 8px;font-size:7.5pt;font-weight:600;text-align:left;border-right:1px solid #2e4a6a}
.data-table thead th:last-child{border-right:none;width:36px}
.data-table tbody tr{border-bottom:1px solid #dde3eb}
.data-table tbody tr:nth-child(even){background:#f7f9fb}
.data-table tbody td{padding:3px 5px;border-right:1px solid #dde3eb;vertical-align:middle}
.data-table tbody td:last-child{border-right:none;text-align:center}
.data-table tbody td input,.data-table tbody td select{font-size:9pt;padding:2px 3px}
.row-num{font-size:8pt;color:#7a8fa6;font-weight:600;text-align:center;width:22px}
.add-row-btn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:4px 10px;font-size:8pt;font-family:'Source Sans 3',sans-serif;color:#1a2e4a;border:1px solid #b0b8c4;border-radius:3px;cursor:pointer;background:#f7f9fb}
.add-row-btn:hover{background:#edf1f6;border-color:#1a2e4a}
.del-row-btn{background:none;border:none;cursor:pointer;color:#b0b8c4;font-size:13pt;line-height:1;padding:1px 3px}
.del-row-btn:hover{color:#c0392b}

/* FIRMA */
.firma-tabs{display:flex;gap:4px;margin-bottom:8px}
.firma-tab{padding:4px 12px;font-size:8pt;font-family:'Source Sans 3',sans-serif;cursor:pointer;border:1px solid #b0b8c4;border-radius:3px;background:#f7f9fb;color:#1a2e4a}
.firma-tab.active{background:#1a2e4a;color:#fff;border-color:#1a2e4a}
.firma-panel{display:none}.firma-panel.active{display:block}
.firma-canvas{border:1.5px dashed #b0b8c4;border-radius:4px;cursor:crosshair;touch-action:none;background:#fff;width:100%;height:110px}
.firma-tools{display:flex;gap:8px;margin-top:5px;align-items:center}
.firma-tools button{font-family:'Source Sans 3',sans-serif;font-size:7.5pt;padding:3px 8px;border:1px solid #b0b8c4;border-radius:3px;cursor:pointer;background:#f7f9fb}
.firma-img-preview{max-height:110px;max-width:100%;border:1.5px dashed #b0b8c4;border-radius:4px;display:none;margin-top:6px}

/* ADJUNTOS */
.adjuntos-area{border:2px dashed #b0b8c4;border-radius:6px;padding:14px;text-align:center;cursor:pointer;background:#f7f9fb;transition:border-color .15s}
.adjuntos-area:hover{border-color:#c0832a;background:#fffdf7}
.adjuntos-area p{font-size:9pt;color:#7a8fa6}
.adjuntos-area span{font-size:8pt;color:#b0b8c4}
.adjuntos-list{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.adj-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#f0f4f8;border-radius:3px;font-size:8pt;color:#1a2e4a}
.adj-item button{background:none;border:none;cursor:pointer;color:#b0b8c4;font-size:12pt}
.adj-item button:hover{color:#c0392b}

/* ADD ASESOR BTN */
.add-asesor-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#fff;border:2px dashed #b0b8c4;border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:11pt;font-weight:600;color:#1a2e4a;cursor:pointer;transition:all .15s;margin-bottom:20px}
.add-asesor-btn:hover{border-color:#c0832a;color:#c0832a;background:#fffdf7}

/* NOTAS */
.notas-box{background:#fff8e6;border-left:3px solid #c0832a;padding:10px 14px;font-size:8.5pt;color:#854F0B;line-height:1.5;margin-top:14px;border-radius:0 4px 4px 0}

/* SEND BTN */
.send-btn{position:fixed;bottom:24px;right:24px;background:#1a2e4a;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 16px rgba(26,46,74,.3);display:flex;align-items:center;gap:8px;transition:background .15s;z-index:100}
.send-btn:hover{background:#c0832a}
</style>
<script src="https://unpkg.com/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init({publicKey:"rEXqEhGtvHco_F1Zx"});</script>
</head>
<body>

<!-- GLOBAL HEADER -->
<div class="global-header">
  <div class="accent-bar"></div>
  <div class="doc-header">
    <div class="university-name">Pontificia Universidad Católica Madre y Maestra</div>
    <div class="decanato">Decanato de Postgrado</div>
    <div class="doc-title">Ficha del Asesor de Investigación de Postgrado</div>
  </div>
  <div class="coord-strip">
    <div class="field-group">
      <div class="field-label">Coordinador responsable</div>
      <input type="text" id="coordNombre" placeholder="Nombre completo">
    </div>
    <div class="field-group">
      <div class="field-label">Programa / Maestría</div>
      <input type="text" id="coordPrograma" placeholder="Puede indicar más de uno">
    </div>
    <div class="field-group">
      <div class="field-label">Fecha</div>
      <input type="date" id="coordFecha">
    </div>
  </div>
</div>

<!-- ASESORES CONTAINER -->
<div id="asesoresContainer"></div>

<!-- ADD ASESOR -->
<button class="add-asesor-btn" onclick="addAsesor()">+ Agregar otro asesor</button>

<!-- SEND -->
<button class="send-btn" onclick="enviar()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  Enviar Fichas
</button>

<script>
let asesorCount = 0;
const gradoOpts   = ['Licenciatura','Especialidad','Maestría','Doctorado','Postdoctorado'];
const modalOpts   = ['Curso','Taller','Seminario','Diplomado','Simposio','Congreso','Otro'];
const expOpts     = ['Investigador','Asesor de investigación','Jurado de Tesis','Docente de investigación','Profesional de su ámbito','Otro'];

// ── ADD ASESOR ──
function addAsesor(){
  asesorCount++;
  const id = asesorCount;
  const div = document.createElement('div');
  div.className = 'asesor-card';
  div.id = `asesor-${id}`;
  div.innerHTML = buildAsesorHTML(id);
  document.getElementById('asesoresContainer').appendChild(div);
  initCanvas(id);
  // init 3 rows each table
  ['Formacion','Estudios','Experiencia','Publicaciones'].forEach(t => {
    for(let i=0;i<3;i++) addTableRow(id, t);
  });
  updatePreview(id);
}

function buildAsesorHTML(id){
  return `
  <div class="asesor-card-header" onclick="toggleAsesor(${id})">
    <div class="asesor-card-title">
      <span class="asesor-num">Asesor ${id}</span>
      <span class="asesor-name-preview" id="preview-${id}">Sin nombre aún</span>
    </div>
    <div class="asesor-card-actions" onclick="event.stopPropagation()">
      <button class="collapse-btn" onclick="toggleAsesor(${id})">Minimizar ▲</button>
      <button class="del-asesor-btn" onclick="delAsesor(${id})">✕ Eliminar</button>
    </div>
  </div>
  <div class="asesor-body" id="body-${id}">

    <!-- DATOS PERSONALES -->
    <div class="section-title">Datos Personales</div>
    <div class="datos-grid">
      <div class="foto-cell">
        <div class="foto-preview" onclick="document.getElementById('foto-input-${id}').click()">
          <img id="foto-img-${id}" alt="Foto">
          <div class="foto-placeholder" id="foto-ph-${id}">📷<br>Clic para<br>cargar foto</div>
        </div>
        <input type="file" id="foto-input-${id}" accept="image/*" style="display:none" onchange="cargarFoto(${id},this)">
        <button class="foto-btn" onclick="document.getElementById('foto-input-${id}').click()">Cargar foto</button>
      </div>
      <div class="datos-fields">
        <div class="field-row">
          <div class="field-group">
            <div class="field-label">Nombre y Apellidos</div>
            <input type="text" id="nombre-${id}" placeholder="Nombre completo" oninput="updatePreview(${id})">
          </div>
        </div>
        <div class="field-row two">
          <div class="field-group"><div class="field-label">Cédula</div><input type="text" id="cedula-${id}" placeholder="000-0000000-0"></div>
          <div class="field-group"><div class="field-label">ID Institucional</div><input type="text" id="idInst-${id}" placeholder="ID"></div>
        </div>
        <div class="field-row two">
          <div class="field-group"><div class="field-label">Teléfono</div><input type="tel" id="tel-${id}" placeholder="000-000-0000"></div>
          <div class="field-group"><div class="field-label">Correo Institucional</div><input type="email" id="correo-${id}" placeholder="correo@pucmm.edu.do"></div>
        </div>
        <div class="field-row two">
          <div class="field-group"><div class="field-label">Tipo de Asesor</div><input type="text" id="tipo-${id}" placeholder="Metodológico, De Contenido, Ambos..."></div>
          <div class="field-group"><div class="field-label">Facultad</div><input type="text" id="facultad-${id}" placeholder="Nombre de la facultad"></div>
        </div>
        <div class="field-row">
          <div class="field-group"><div class="field-label">Programa Académico en que Asesora</div><input type="text" id="programa-${id}" placeholder="Maestría / Doctorado en..."></div>
        </div>
      </div>
    </div>

    <!-- FORMACIÓN ACADÉMICA -->
    <div class="section-title">Formación Académica</div>
    <table class="data-table">
      <thead><tr><th style="width:22px">#</th><th style="width:130px">Grado</th><th>Área de Especialización</th><th style="width:65px">Año</th><th>Institución</th><th style="width:34px"></th></tr></thead>
      <tbody id="tblFormacion-${id}"></tbody>
    </table>
    <button class="add-row-btn" onclick="addTableRow(${id},'Formacion')">+ Agregar fila</button>

    <!-- OTROS ESTUDIOS -->
    <div class="section-title">Otros Estudios en el Área Investigativa</div>
    <table class="data-table">
      <thead><tr><th style="width:22px">#</th><th style="width:110px">Modalidad</th><th>Certificación / Descripción</th><th style="width:65px">Año</th><th>Institución</th><th style="width:34px"></th></tr></thead>
      <tbody id="tblEstudios-${id}"></tbody>
    </table>
    <button class="add-row-btn" onclick="addTableRow(${id},'Estudios')">+ Agregar fila</button>

    <!-- EXPERIENCIA -->
    <div class="section-title">Experiencia Investigativa y Profesional</div>
    <table class="data-table">
      <thead><tr><th style="width:22px">#</th><th>Función / Cargo</th><th style="width:80px">Años</th><th>Institución(es)</th><th style="width:34px"></th></tr></thead>
      <tbody id="tblExperiencia-${id}"></tbody>
    </table>
    <button class="add-row-btn" onclick="addTableRow(${id},'Experiencia')">+ Agregar fila</button>

    <!-- PUBLICACIONES -->
    <div class="section-title">Publicaciones Científicas o Académicas</div>
    <table class="data-table">
      <thead><tr><th style="width:22px">#</th><th>Título de la publicación</th><th style="width:150px">Revista o Editorial</th><th style="width:65px">Año</th><th style="width:34px"></th></tr></thead>
      <tbody id="tblPublicaciones-${id}"></tbody>
    </table>
    <button class="add-row-btn" onclick="addTableRow(${id},'Publicaciones')">+ Agregar fila</button>

    <!-- FIRMA -->
    <div class="section-title">Firma del Asesor</div>
    <div class="firma-tabs">
      <button class="firma-tab active" id="ftab-draw-${id}" onclick="switchFirma(${id},'draw')">✏️ Dibujar firma</button>
      <button class="firma-tab" id="ftab-upload-${id}" onclick="switchFirma(${id},'upload')">📎 Cargar imagen</button>
    </div>
    <div class="firma-panel active" id="fpanel-draw-${id}">
      <canvas class="firma-canvas" id="canvas-${id}" width="800" height="110"></canvas>
      <div class="firma-tools">
        <button onclick="clearCanvas(${id})">Limpiar</button>
        <label style="font-size:7.5pt;color:#7a8fa6">Grosor:</label>
        <input type="range" id="grosor-${id}" min="1" max="6" value="2" style="width:70px">
        <input type="color" id="color-${id}" value="#1a2e4a" style="width:28px;height:22px;border:none;cursor:pointer;border-radius:3px">
      </div>
    </div>
    <div class="firma-panel" id="fpanel-upload-${id}">
      <button class="foto-btn" onclick="document.getElementById('firma-input-${id}').click()">Cargar imagen de firma</button>
      <input type="file" id="firma-input-${id}" accept="image/*" style="display:none" onchange="cargarFirmaImg(${id},this)">
      <img id="firma-img-${id}" class="firma-img-preview" alt="Firma">
    </div>

    <!-- ADJUNTOS -->
    <div class="section-title">Anexos — Copias de Títulos y Certificaciones</div>
    <div class="adjuntos-area" onclick="document.getElementById('adj-input-${id}').click()">
      <p>📎 Haz clic para adjuntar archivos</p>
      <span>Selecciona múltiples archivos (PDF, JPG, PNG) — un archivo por título o certificación</span>
    </div>
    <input type="file" id="adj-input-${id}" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="agregarAdjuntos(${id},this)">
    <div class="adjuntos-list" id="adj-list-${id}"></div>

    <div class="notas-box">
      <strong>Nota:</strong> Al enviar, su correo se abrirá con la ficha de todos los asesores lista. Los adjuntos deben agregarse manualmente al correo.
    </div>
  </div>`;
}

// ── TOGGLE ──
function toggleAsesor(id){
  const body = document.getElementById(`body-${id}`);
  const btn = document.querySelector(`#asesor-${id} .collapse-btn`);
  if(body.classList.contains('collapsed')){
    body.classList.remove('collapsed');
    btn.textContent = 'Minimizar ▲';
  } else {
    body.classList.add('collapsed');
    btn.textContent = 'Expandir ▼';
  }
}

function delAsesor(id){
  if(!confirm('¿Eliminar este asesor?')) return;
  document.getElementById(`asesor-${id}`).remove();
}

function updatePreview(id){
  const el = document.getElementById(`preview-${id}`);
  const nombre = (document.getElementById(`nombre-${id}`)||{}).value||'';
  el.textContent = nombre || 'Sin nombre aún';
}

// ── TABLE ROWS ──
function addTableRow(id, type){
  const tbody = document.getElementById(`tbl${type}-${id}`);
  const n = tbody.rows.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = buildRow(id, type, n);
  tbody.appendChild(tr);
  renumberTable(`tbl${type}-${id}`);
}

function buildRow(id, type, n){
  if(type==='Formacion') return `
    <td class="row-num">${n}</td>
    <td><select style="font-size:8.5pt">${gradoOpts.map(o=>`<option>${o}</option>`).join('')}</select></td>
    <td><input type="text" placeholder="Área de especialización"></td>
    <td><input type="text" placeholder="Año" style="width:58px"></td>
    <td><input type="text" placeholder="Institución"></td>
    <td><button class="del-row-btn" onclick="delRow(this,'tbl${type}-${id}')">×</button></td>`;
  if(type==='Estudios') return `
    <td class="row-num">${n}</td>
    <td><select style="font-size:8.5pt">${modalOpts.map(o=>`<option>${o}</option>`).join('')}</select></td>
    <td><input type="text" placeholder="Nombre del estudio / certificación"></td>
    <td><input type="text" placeholder="Año" style="width:58px"></td>
    <td><input type="text" placeholder="Institución"></td>
    <td><button class="del-row-btn" onclick="delRow(this,'tbl${type}-${id}')">×</button></td>`;
  if(type==='Experiencia') return `
    <td class="row-num">${n}</td>
    <td><select style="font-size:8.5pt">${expOpts.map(o=>`<option>${o}</option>`).join('')}</select></td>
    <td><input type="text" placeholder="Años" style="width:70px"></td>
    <td><input type="text" placeholder="Institución(es)"></td>
    <td><button class="del-row-btn" onclick="delRow(this,'tbl${type}-${id}')">×</button></td>`;
  if(type==='Publicaciones') return `
    <td class="row-num">${n}</td>
    <td><input type="text" placeholder="Título completo de la publicación"></td>
    <td><input type="text" placeholder="Revista o Editorial"></td>
    <td><input type="text" placeholder="Año" style="width:58px"></td>
    <td><button class="del-row-btn" onclick="delRow(this,'tbl${type}-${id}')">×</button></td>`;
}

function delRow(btn, tbodyId){
  btn.closest('tr').remove();
  renumberTable(tbodyId);
}
function renumberTable(tbodyId){
  document.querySelectorAll(`#${tbodyId} .row-num`).forEach((td,i)=>td.textContent=i+1);
}

// ── FOTO ──
const fotoData = {};
function cargarFoto(id, input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    fotoData[id] = e.target.result;
    const img = document.getElementById(`foto-img-${id}`);
    img.src = fotoData[id]; img.style.display='block';
    document.getElementById(`foto-ph-${id}`).style.display='none';
  };
  reader.readAsDataURL(file);
}

// ── CANVAS ──
const canvasState = {};
function initCanvas(id){
  const canvas = document.getElementById(`canvas-${id}`);
  if(!canvas) return;
  canvasState[id] = {drawing:false, lastX:0, lastY:0};
  const ctx = canvas.getContext('2d');
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width/r.width, sy = canvas.height/r.height;
    if(e.touches) return [(e.touches[0].clientX-r.left)*sx,(e.touches[0].clientY-r.top)*sy];
    return [(e.clientX-r.left)*sx,(e.clientY-r.top)*sy];
  };
  const draw = e => {
    if(!canvasState[id].drawing) return;
    const [x,y] = getPos(e);
    ctx.beginPath(); ctx.moveTo(canvasState[id].lastX, canvasState[id].lastY);
    ctx.lineTo(x,y);
    ctx.strokeStyle = document.getElementById(`color-${id}`).value;
    ctx.lineWidth = document.getElementById(`grosor-${id}`).value;
    ctx.lineCap='round'; ctx.stroke();
    canvasState[id].lastX=x; canvasState[id].lastY=y;
  };
  canvas.addEventListener('mousedown', e=>{canvasState[id].drawing=true;[canvasState[id].lastX,canvasState[id].lastY]=getPos(e)});
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', ()=>canvasState[id].drawing=false);
  canvas.addEventListener('mouseleave', ()=>canvasState[id].drawing=false);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();canvasState[id].drawing=true;[canvasState[id].lastX,canvasState[id].lastY]=getPos(e)},{passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault();draw(e)},{passive:false});
  canvas.addEventListener('touchend', ()=>canvasState[id].drawing=false);
}
function clearCanvas(id){ const c=document.getElementById(`canvas-${id}`); c.getContext('2d').clearRect(0,0,c.width,c.height); }

// ── FIRMA IMG ──
const firmaImgData = {};
function cargarFirmaImg(id, input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    firmaImgData[id] = e.target.result;
    const img = document.getElementById(`firma-img-${id}`);
    img.src = firmaImgData[id]; img.style.display='block';
  };
  reader.readAsDataURL(file);
}
function switchFirma(id, type){
  document.getElementById(`ftab-draw-${id}`).classList.toggle('active', type==='draw');
  document.getElementById(`ftab-upload-${id}`).classList.toggle('active', type==='upload');
  document.getElementById(`fpanel-draw-${id}`).classList.toggle('active', type==='draw');
  document.getElementById(`fpanel-upload-${id}`).classList.toggle('active', type==='upload');
}

// ── ADJUNTOS ──
const adjuntosData = {};
function agregarAdjuntos(id, input){
  if(!adjuntosData[id]) adjuntosData[id]=[];
  Array.from(input.files).forEach(f=>{
    if(!adjuntosData[id].find(a=>a.name===f.name&&a.size===f.size)) adjuntosData[id].push(f);
  });
  renderAdjuntos(id);
  input.value='';
}
function renderAdjuntos(id){
  const list = document.getElementById(`adj-list-${id}`);
  list.innerHTML = (adjuntosData[id]||[]).map((f,i)=>`
    <div class="adj-item">
      <span>📄 ${f.name} <span style="color:#b0b8c4">(${(f.size/1024).toFixed(1)} KB)</span></span>
      <button onclick="removeAdj(${id},${i})">×</button>
    </div>`).join('');
}
function removeAdj(id,i){ adjuntosData[id].splice(i,1); renderAdjuntos(id); }

// ── GET DATA ──
function getTableText(tbodyId){
  const rows=[];
  document.querySelectorAll(`#${tbodyId} tr`).forEach(tr=>{
    const vals=Array.from(tr.querySelectorAll('input,select')).map(c=>c.value||'—');
    if(vals.length) rows.push(vals.join(' | '));
  });
  return rows;
}

function buildBody(){
  const v = id => (document.getElementById(id)||{}).value||'';
  let body = `##INICIO##\n`;
  body += `##COORDINADOR##${v('coordNombre')}##\n`;
  body += `##PROGRAMA_COORD##${v('coordPrograma')}##\n`;
  body += `##FECHA##${v('coordFecha')}##\n\n`;

  document.querySelectorAll('.asesor-card').forEach((card,idx)=>{
    const id = card.id.replace('asesor-','');
    body += `========== ASESOR ${idx+1} ==========\n`;
    body += `Nombre: ${v(`nombre-${id}`)}\n`;
    body += `Cédula: ${v(`cedula-${id}`)} | ID: ${v(`idInst-${id}`)}\n`;
    body += `Teléfono: ${v(`tel-${id}`)} | Correo: ${v(`correo-${id}`)}\n`;
    body += `Tipo: ${v(`tipo-${id}`)} | Facultad: ${v(`facultad-${id}`)}\n`;
    body += `Programa: ${v(`programa-${id}`)}\n\n`;
    body += `-- Formación Académica --\n`;
    getTableText(`tblFormacion-${id}`).forEach((r,i)=>body+=`${i+1}. ${r}\n`);
    body += `\n-- Otros Estudios --\n`;
    getTableText(`tblEstudios-${id}`).forEach((r,i)=>body+=`${i+1}. ${r}\n`);
    body += `\n-- Experiencia --\n`;
    getTableText(`tblExperiencia-${id}`).forEach((r,i)=>body+=`${i+1}. ${r}\n`);
    body += `\n-- Publicaciones --\n`;
    getTableText(`tblPublicaciones-${id}`).forEach((r,i)=>body+=`${i+1}. ${r}\n`);
    const adjs = adjuntosData[id]||[];
    if(adjs.length){
      body += `\n-- Adjuntos (${adjs.length}) --\n`;
      adjs.forEach(f=>body+=`• ${f.name}\n`);
    }
    body += `\n`;
  });

  body += `##FIN##`;
  return body;
}

// ── ENVIAR ──
async function enviar(){
  const coord = document.getElementById('coordNombre').value.trim();
  if(!coord){ alert('Por favor ingresa el nombre del coordinador.'); document.getElementById('coordNombre').focus(); return; }
  if(!document.querySelector('.asesor-card')){ alert('Por favor agrega al menos un asesor.'); return; }

  const btn = document.querySelector('.send-btn');
  btn.textContent = 'Enviando...';
  btn.disabled = true;

  try {
    // Convert all adjuntos to base64
    const allAdjBase64 = [];
    for(const card of document.querySelectorAll('.asesor-card')){
      const id = card.id.replace('asesor-','');
      for(const file of (adjuntosData[id]||[])){
        const b64 = await fileToBase64(file);
        allAdjBase64.push({ name: file.name, data: b64 });
      }
    }

    const templateParams = {
      subject: `Fichas de Asesores de Investigación — ${coord}`,
      name: coord,
      email: 'gabrielferreras@pucmm.edu.do',
      message: buildBody(),
    };

    // EmailJS only supports 1 attachment natively on paid plan
    // We encode files as base64 text blocks appended to message
    if(allAdjBase64.length > 0){
      templateParams.message += '\n\n===== ARCHIVOS ADJUNTOS =====\n';
      templateParams.message += `Se adjuntan ${allAdjBase64.length} archivo(s) como archivos separados.\n`;
      allAdjBase64.forEach(f => templateParams.message += `• ${f.name}\n`);
    }

    await emailjs.send('service_a4hm6sb', 'template_air3te3', templateParams, {publicKey: 'rEXqEhGtvHco_F1Zx'});

    // If there are attachments, also open mailto as fallback so files can be sent
    if(allAdjBase64.length > 0){
      alert(`✅ ¡Ficha enviada exitosamente!\n\nTienes ${allAdjBase64.length} archivo(s) adjunto(s). Se abrirá tu correo para que puedas enviarlos manualmente junto con la ficha.\n\n${allAdjBase64.map(f=>'• '+f.name).join('\n')}`);
      const subj = encodeURIComponent(`Anexos — Fichas de Asesores — ${coord}`);
      const body = encodeURIComponent(`Adjuntos correspondientes a las fichas de asesores enviadas por ${coord}.\n\nArchivos:\n${allAdjBase64.map(f=>'• '+f.name).join('\n')}`);
      window.location.href = `mailto:alexisborges@pucmm.edu.do?cc=Gabrielferreras@pucmm.edu.do&subject=${subj}&body=${body}`;
    } else {
      alert('✅ ¡Ficha enviada exitosamente! Alexis Borges y Gabriel Ferreras han recibido la información.');
    }
  } catch(err){
    console.error(err);
    alert('❌ Error al enviar. Por favor intenta de nuevo o contacta a soporte.');
  } finally {
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Enviar Fichas';
    btn.disabled = false;
  }
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
